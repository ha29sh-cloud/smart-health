<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>النصائح الصحية - صحتي الذكية</title>

<!-- Cairo Font -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet">

<!-- Lucide Icons -->
<script src="https://unpkg.com/lucide@latest"></script>

<style>
:root {
  --primary: #0284c7; /* light medical blue */
  --primary-glow: rgba(2, 132, 199, 0.2);
  --bg: #f0f9ff;
  --card-bg: #ffffff;
  --border: rgba(14, 165, 233, 0.15);
  --box-bg: #f8fafc;
  --box-hover-bg: #f0f9ff;
  --text-primary: #0f172a;
  --text-secondary: #0284c7;
  --text-muted: #64748b;
  --accent-emerald: #10b981;
  --accent-rose: #f43f5e;
  --bg-gradient: linear-gradient(135deg, #e0f2fe 0%, #f0f9ff 100%);
  --orb-1: rgba(14, 165, 233, 0.15);
  --orb-2: rgba(34, 197, 94, 0.1);
  --shadow: 0 10px 30px rgba(2, 132, 199, 0.08);
}

body.dark-theme {
  --primary: #4f46e5;
  --primary-glow: rgba(79, 70, 229, 0.4);
  --bg: #0f172a;
  --card-bg: rgba(30, 41, 59, 0.75);
  --border: rgba(255, 255, 255, 0.08);
  --box-bg: rgba(15, 23, 42, 0.4);
  --box-hover-bg: rgba(15, 23, 42, 0.6);
  --text-primary: #f8fafc;
  --text-secondary: #94a3b8;
  --text-muted: #64748b;
  --accent-emerald: #10b981;
  --accent-rose: #f43f5e;
  --bg-gradient: radial-gradient(circle at top right, #1e1b4b 0%, #0f172a 100%);
  --orb-1: rgba(79, 70, 229, 0.35);
  --orb-2: rgba(16, 185, 129, 0.2);
  --shadow: 0 20px 40px rgba(0, 0, 0, 0.3);
}

* {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
}

body {
  font-family: "Cairo", sans-serif;
  background: var(--bg-gradient);
  color: var(--text-primary);
  min-height: 100vh;
  padding: 20px 20px 80px 20px;
  display: flex;
  justify-content: center;
  align-items: flex-start;
  position: relative;
}

body::before, body::after {
  content: "";
  position: absolute;
  border-radius: 50%;
  filter: blur(120px);
  z-index: 0;
}
body::before {
  width: 250px;
  height: 250px;
  background: var(--orb-1);
  top: 10%;
  right: 10%;
}
body::after {
  width: 200px;
  height: 200px;
  background: var(--orb-2);
  bottom: 10%;
  left: 10%;
}

.container {
  max-width: 480px;
  width: 100%;
  background: var(--card-bg);
  backdrop-filter: blur(16px);
  -webkit-backdrop-filter: blur(16px);
  border: 1px solid var(--border);
  padding: 25px;
  border-radius: 24px;
  box-shadow: var(--shadow);
  z-index: 10;
  animation: fadeInUp 0.6s cubic-bezier(0.16, 1, 0.3, 1) both;
}

@keyframes fadeInUp {
  from { opacity: 0; transform: translateY(20px); }
  to { opacity: 1; transform: translateY(0); }
}

.header-area {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 25px;
}

h2 {
  font-size: 22px;
  font-weight: 800;
  color: var(--text-primary);
}

.theme-toggle-btn {
  background: rgba(255, 255, 255, 0.05);
  border: 1px solid var(--border);
  color: var(--text-primary);
  width: 40px;
  height: 40px;
  border-radius: 12px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: all 0.3s;
}
.theme-toggle-btn:hover {
  background: rgba(255, 255, 255, 0.15);
  transform: scale(1.05);
}

.tips-list {
  display: flex;
  flex-direction: column;
  gap: 14px;
  margin-bottom: 15px;
}

.tip {
  background: var(--box-bg);
  border: 1px solid var(--border);
  padding: 16px;
  border-radius: 16px;
  display: flex;
  align-items: flex-start;
  gap: 14px;
  transition: all 0.3s;
}

.tip:hover {
  background: var(--box-hover-bg);
  border-color: var(--primary);
}

.tip-icon {
  width: 42px;
  height: 42px;
  border-radius: 12px;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
}

.tip-content {
  flex: 1;
  font-size: 15px;
  color: var(--text-primary);
  line-height: 1.6;
  font-weight: 600;
}

/* Empty state design */
.empty-state {
  text-align: center;
  padding: 40px 20px;
}

.empty-state i {
  width: 64px;
  height: 64px;
  color: var(--text-secondary);
  margin-bottom: 20px;
  opacity: 0.6;
}

.empty-state p {
  color: var(--text-secondary);
  font-size: 15px;
  margin-bottom: 25px;
  line-height: 1.6;
}

.btn-primary {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  gap: 10px;
  padding: 14px 28px;
  background: linear-gradient(135deg, #4f46e5 0%, #3b82f6 100%);
  color: #fff;
  border-radius: 12px;
  text-decoration: none;
  font-size: 15px;
  font-weight: 700;
  transition: all 0.3s;
  box-shadow: 0 8px 24px rgba(79, 70, 229, 0.3);
  border: none;
  cursor: pointer;
}

.btn-primary:hover {
  transform: translateY(-2px);
  box-shadow: 0 12px 30px rgba(79, 70, 229, 0.5);
}

/* Bottom Navigation */
.bottom-nav {
  position: fixed;
  bottom: 0;
  left: 0;
  right: 0;
  background: var(--card-bg);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  border-top: 1px solid var(--border);
  padding: 10px 20px;
  display: flex;
  justify-content: space-around;
  z-index: 100;
  box-shadow: 0 -4px 20px rgba(0, 0, 0, 0.05);
}

.nav-item {
  display: flex;
  flex-direction: column;
  align-items: center;
  color: var(--text-muted);
  text-decoration: none;
  font-size: 11px;
  font-weight: bold;
  gap: 4px;
  transition: color 0.3s;
  width: 60px;
}

.nav-item i {
  width: 20px;
  height: 20px;
  transition: transform 0.3s;
}

.nav-item:hover {
  color: var(--text-primary);
}

.nav-item.active {
  color: var(--primary);
  text-shadow: 0 0 10px var(--primary-glow);
}

.nav-item.active i {
  transform: translateY(-2px);
}
</style>
</head>
<body>
<script>
  (function() {
    const savedTheme = localStorage.getItem("theme") || "light";
    if (savedTheme === "dark") {
      document.body.classList.add("dark-theme");
    }
  })();
</script>

<div class="container">
  <div class="header-area">
    <button id="themeToggleBtn" class="theme-toggle-btn" onclick="window.toggleTheme()">
      <i data-lucide="moon"></i>
    </button>
    <h2>نصائح صحية اليوم</h2>
    <div style="width: 40px;"></div> <!-- placeholder to center title -->
  </div>

  <!-- Content to be loaded dynamically -->
  <div id="content">
    <div style="text-align: center; padding: 40px 0;">
      <p style="color: var(--text-secondary);">جاري توليد النصائح...</p>
    </div>
  </div>
</div>

<!-- Bottom Navigation -->
<div class="bottom-nav">
  <a href="dashboard.html" class="nav-item">
    <i data-lucide="layout-dashboard"></i>
    الرئيسية
  </a>
  <a href="analysis.html" class="nav-item">
    <i data-lucide="brain-circuit"></i>
    التحليل
  </a>
  <a href="reports.html" class="nav-item">
    <i data-lucide="clipboard-list"></i>
    التقارير
  </a>
  <a href="tips.html" class="nav-item active">
    <i data-lucide="sparkles"></i>
    النصائح
  </a>
</div>

<script type="module">
import { db } from "./firebase-config.js";
import { doc, getDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const uid = localStorage.getItem("uid");
if (!uid) {
  window.location.href = "index.html";
}

window.toggleTheme = function() {
  const isDark = document.body.classList.toggle("dark-theme");
  localStorage.setItem("theme", isDark ? "dark" : "light");
  window.updateThemeIcon();
};

window.updateThemeIcon = function() {
  const btn = document.getElementById("themeToggleBtn");
  if (btn) {
    const isDark = document.body.classList.contains("dark-theme");
    btn.innerHTML = `<i data-lucide="${isDark ? 'sun' : 'moon'}"></i>`;
    if (window.lucide) {
      lucide.createIcons();
    }
  }
};

async function loadTips() {
  const today = new Date().toISOString().split("T")[0];

  try {
    const snap = await getDoc(doc(db, "users", uid, "days", today));

    if (!snap.exists()) {
      renderEmptyState();
      return;
    }

    const d = snap.data();
    const tips = [];

    // 1. Sleep Tip
    if (d.sleep < 6) {
      tips.push({ text: "ساعات نومك منخفضة. احرص على النوم مبكراً وتجنب الشاشات الزرقاء قبل النوم بساعة لتنعم بنوم عميق.", icon: "moon", color: "#f59e0b", bg: "rgba(245, 158, 11, 0.1)" });
    } else if (d.sleep >= 7) {
      tips.push({ text: "رائع! ساعات نومك ممتازة وكافية لمد جسمك بالطاقة اللازمة لبقية اليوم.", icon: "check-circle", color: "#10b981", bg: "rgba(16, 185, 129, 0.1)" });
    }

    // 2. Water Tip
    if (d.water < 2) {
      tips.push({ text: "شرب الماء ضروري جداً. يرجى تناول 2-3 لتر ماء يومياً للمحافظة على ترطيب خلايا الجسم.", icon: "droplet", color: "#38bdf8", bg: "rgba(56, 189, 248, 0.1)" });
    } else if (d.water >= 3) {
      tips.push({ text: "أحسنت! كمية ترطيبك للجسم اليوم ممتازة وصحية جداً.", icon: "award", color: "#10b981", bg: "rgba(16, 185, 129, 0.1)" });
    }

    // 3. Sitting Tip
    if (d.sitting > 5) {
      tips.push({ text: "لقد جلست لفترات طويلة اليوم. احرص على الوقوف والتمشي لمدة 5 دقائق بعد كل ساعة جلوس.", icon: "activity", color: "#a78bfa", bg: "rgba(167, 139, 250, 0.1)" });
    }

    // 4. Smoker Tip
    if (d.smoker === "yes") {
      tips.push({ text: "الإقلاع عن التدخين هو أكبر استثمار لسلامة قلبك وجهازك التنفسي. لا تتردد في البدء بالتقليل تدريجياً.", icon: "ban", color: "#f43f5e", bg: "rgba(244, 63, 94, 0.1)" });
    }

    // 5. Daily Activity Tip
    if (d.activity === "low") {
      tips.push({ text: "مستوى نشاطك البدني منخفض اليوم. حاول ممارسة المشي السريع لمدة 15-30 دقيقة لتنشيط دورتك الدموية.", icon: "footprints", color: "#ec4899", bg: "rgba(236, 72, 153, 0.1)" });
    } else if (d.activity === "high") {
      tips.push({ text: "أداء ممتاز! استمر على نشاطك البدني العالي فهو يحمي قلبك وعضلاتك.", icon: "zap", color: "#f59e0b", bg: "rgba(245, 158, 11, 0.1)" });
    }

    // 6. Food Quality Tip
    const foodRating = d.food !== undefined ? Number(d.food) : 5;
    if (foodRating <= 4) {
      tips.push({ text: "جودة طعامك منخفضة اليوم. حاول إضافة الخضروات والفواكه وتقليل الأطعمة المصنعة والسكريات.", icon: "soup", color: "#10b981", bg: "rgba(16, 185, 129, 0.1)" });
    } else if (foodRating >= 8) {
      tips.push({ text: "تغذية صحية ومتوازنة! استمر في إمداد جسمك بالعناصر الغذائية المفيدة والنظيفة.", icon: "heart", color: "#f43f5e", bg: "rgba(244, 63, 94, 0.1)" });
    }

    // 7. Mental State / Mood Tip
    if (d.mood === "sad") {
      tips.push({ text: "صحتك النفسية تهمنا. خذ استراحة وتأمل، أو تحدث مع صديق مقرب لمشاركة مشاعرك.", icon: "frown", color: "#0ea5e9", bg: "rgba(14, 165, 233, 0.1)" });
    } else if (d.mood === "happy") {
      tips.push({ text: "سعادتك تنعكس إيجابياً على مناعة جسمك وصحتك العامة. دمت بابتسامة وصحة جيدة! 😊", icon: "smile", color: "#f59e0b", bg: "rgba(245, 158, 11, 0.1)" });
    }

    if (tips.length === 0) {
      tips.push({ text: "أحسنت! عاداتك اليومية ممتازة ومثالية جداً، استمر على هذا النمط الصحي الرائع.", icon: "award", color: "#10b981", bg: "rgba(16, 185, 129, 0.1)" });
    }

    renderTipsContent(tips);

  } catch (err) {
    console.error("Error loading tips:", err);
    document.getElementById("content").innerHTML = `
      <div class="empty-state">
        <i data-lucide="alert-triangle" style="color: #f43f5e;"></i>
        <p style="color: #f43f5e; font-weight: bold; margin-bottom: 10px;">فشل الاتصال بقاعدة البيانات</p>
        <p style="font-size: 13px; max-width: 320px; margin: 0 auto 20px auto;">يرجى التأكد من تفعيل قواعد البيانات Firestore Database في لوحة تحكم Firebase وتحديث الصفحة.</p>
        <a href="https://console.firebase.google.com" target="_blank" class="btn-primary" style="padding: 10px 20px; font-size: 13px;">
          انتقال إلى لوحة Firebase
        </a>
      </div>
    `;
    lucide.createIcons();
  }
}

function renderEmptyState() {
  const container = document.getElementById("content");
  container.innerHTML = `
    <div class="empty-state">
      <i data-lucide="clipboard-x"></i>
      <p>لم يتم إدخال بيانات اليوم حتى الآن. يرجى تزويدنا ببياناتك اليومية لنتمكن من تقديم نصائح صحية مخصصة لك.</p>
      <a href="input.html" class="btn-primary">
        <i data-lucide="plus-circle" style="width: 20px; height: 20px; margin-left: 8px; vertical-align: middle;"></i>
        إدخال بيانات اليوم
      </a>
    </div>
  `;
  lucide.createIcons();
}

function renderTipsContent(tips) {
  const container = document.getElementById("content");
  
  let tipsHTML = '<div class="tips-list">';
  tips.forEach(t => {
    tipsHTML += `
      <div class="tip">
        <div class="tip-icon" style="background: ${t.bg}; color: ${t.color};">
          <i data-lucide="${t.icon}"></i>
        </div>
        <div class="tip-content">
          ${t.text}
        </div>
      </div>
    `;
  });
  tipsHTML += '</div>';

  container.innerHTML = tipsHTML;
  lucide.createIcons();
}

loadTips();
window.updateThemeIcon();
</script>

<script>
  lucide.createIcons();
</script>
</body>
</html>
