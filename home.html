<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<title>SmartHealth</title>

<script>
  // عند فتح الصفحة، يتم تحويل المستخدم مباشرة إلى لوحة التحكم
  window.onload = function () {
    // لو ما فيه UID يرجع لصفحة تسجيل الدخول
    if (!localStorage.getItem("uid")) {
      window.location.href = "login.html";
      return;
    }

    // لو فيه UID يروح للداشبورد
    window.location.href = "dashboard.html";
  };
</script>

</head>
<body>

<!-- صفحة تحويل فقط -->
<p style="text-align:center; margin-top:40px; font-family:Cairo;">
  جاري التحويل إلى لوحة التحكم...
</p>

</body>
</html>
