<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>إدخال البيانات - صحتي الذكية</title>

<!-- Cairo Font -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet">

<!-- Lucide Icons -->
<script src="https://unpkg.com/lucide@latest"></script>

<style>
:root {
  --primary: #0284c7; /* light medical blue */
  --primary-glow: rgba(2, 132, 199, 0.2);
  --bg: #f0f9ff;
  --card-bg: #ffffff;
  --border: rgba(14, 165, 233, 0.15);
  --input-bg: rgba(241, 245, 249, 0.85);
  --box-hover-bg: #f0f9ff;
  --text-primary: #0f172a;
  --text-secondary: #0284c7;
  --text-muted: #64748b;
  --bg-gradient: linear-gradient(135deg, #e0f2fe 0%, #f0f9ff 100%);
  --orb-1: rgba(14, 165, 233, 0.15);
  --orb-2: rgba(34, 197, 94, 0.1);
  --shadow: 0 10px 30px rgba(2, 132, 199, 0.08);
}

body.dark-theme {
  --primary: #4f46e5;
  --primary-glow: rgba(79, 70, 229, 0.4);
  --bg: #0f172a;
  --card-bg: rgba(30, 41, 59, 0.75);
  --border: rgba(255, 255, 255, 0.08);
  --input-bg: rgba(15, 23, 42, 0.6);
  --box-hover-bg: rgba(30, 41, 59, 0.8);
  --text-primary: #f8fafc;
  --text-secondary: #94a3b8;
  --text-muted: #64748b;
  --bg-gradient: radial-gradient(circle at top right, #1e1b4b 0%, #0f172a 100%);
  --orb-1: rgba(79, 70, 229, 0.35);
  --orb-2: rgba(16, 185, 129, 0.2);
  --shadow: 0 20px 40px rgba(0, 0, 0, 0.3);
}

* {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
}

body {
  font-family: "Cairo", sans-serif;
  background: var(--bg-gradient);
  color: var(--text-primary);
  min-height: 100vh;
  padding: 20px;
  display: flex;
  justify-content: center;
  align-items: center;
  position: relative;
}

body::before, body::after {
  content: "";
  position: absolute;
  border-radius: 50%;
  filter: blur(120px);
  z-index: 0;
}
body::before {
  width: 250px;
  height: 250px;
  background: var(--orb-1);
  top: 10%;
  right: 10%;
}
body::after {
  width: 200px;
  height: 200px;
  background: var(--orb-2);
  bottom: 10%;
  left: 10%;
}

.container {
  max-width: 480px;
  width: 100%;
  background: var(--card-bg);
  backdrop-filter: blur(16px);
  -webkit-backdrop-filter: blur(16px);
  border: 1px solid var(--border);
  padding: 30px;
  border-radius: 24px;
  box-shadow: var(--shadow);
  z-index: 10;
  animation: fadeInUp 0.6s cubic-bezier(0.16, 1, 0.3, 1) both;
}

@keyframes fadeInUp {
  from { opacity: 0; transform: translateY(20px); }
  to { opacity: 1; transform: translateY(0); }
}

.header-area {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 25px;
}

h2 {
  font-size: 22px;
  font-weight: 800;
  color: var(--text-primary);
}

.back-btn {
  display: flex;
  align-items: center;
  justify-content: center;
  width: 40px;
  height: 40px;
  border-radius: 12px;
  background: var(--input-bg);
  border: 1px solid var(--border);
  color: var(--text-primary);
  cursor: pointer;
  transition: all 0.3s;
}

.back-btn:hover {
  background: rgba(255, 255, 255, 0.15);
  transform: translateX(-3px); /* RTL back button logic */
}

.theme-toggle-btn {
  background: var(--input-bg);
  border: 1px solid var(--border);
  color: var(--text-primary);
  width: 40px;
  height: 40px;
  border-radius: 12px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: all 0.3s;
}
.theme-toggle-btn:hover {
  background: rgba(255, 255, 255, 0.15);
  transform: scale(1.05);
}

.form-group {
  margin-bottom: 18px;
}

:root {
  --btn-gradient: linear-gradient(135deg, #0284c7 0%, #38bdf8 100%);
}

body.dark-theme {
  --btn-gradient: linear-gradient(135deg, #4f46e5 0%, #3b82f6 100%);
}

.label-wrapper {
  display: flex;
  align-items: center;
  gap: 8px;
  margin-bottom: 8px;
}

.label-wrapper i {
  color: var(--primary);
  width: 18px;
  height: 18px;
}

label {
  font-size: 14px;
  font-weight: 700;
  color: var(--text-secondary);
}

input[type="number"] {
  width: 100%;
  padding: 14px 16px;
  background: var(--input-bg);
  border: 1px solid var(--border);
  border-radius: 12px;
  color: var(--text-primary);
  font-size: 16px;
  font-family: "Cairo", sans-serif;
  transition: all 0.3s;
  outline: none;
}

input[type="number"]:focus {
  border-color: var(--primary);
  box-shadow: 0 0 10px var(--primary-glow);
  background: var(--card-bg);
}

input::-webkit-outer-spin-button,
input::-webkit-inner-spin-button {
  -webkit-appearance: none;
  margin: 0;
}
input[type=number] {
  -moz-appearance: textfield;
}

/* Custom Range Slider */
.slider-input {
  -webkit-appearance: none;
  width: 100%;
  height: 8px;
  border-radius: 4px;
  background: var(--input-bg);
  outline: none;
  transition: background 0.3s;
  border: 1px solid var(--border);
  margin-top: 8px;
}
.slider-input::-webkit-slider-thumb {
  -webkit-appearance: none;
  appearance: none;
  width: 20px;
  height: 20px;
  border-radius: 50%;
  background: var(--primary);
  cursor: pointer;
  box-shadow: 0 0 10px var(--primary-glow);
  transition: transform 0.1s;
}
.slider-input::-webkit-slider-thumb:hover {
  transform: scale(1.2);
}

.radio-group {
  display: flex;
  gap: 16px;
  margin-top: 6px;
}

.radio-option {
  flex: 1;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 10px;
  padding: 14px;
  background: var(--input-bg);
  border: 1px solid var(--border);
  border-radius: 12px;
  cursor: pointer;
  transition: all 0.3s;
  font-weight: 700;
  color: var(--text-secondary);
}

.radio-option input {
  display: none;
}

.radio-option:hover {
  background: var(--box-hover-bg);
  border-color: var(--primary);
}

.radio-option.selected {
  border-color: var(--primary);
  background: var(--primary-glow);
  color: var(--primary);
}

.btn {
  display: block;
  width: 100%;
  padding: 16px;
  background: var(--btn-gradient);
  color: #fff;
  border-radius: 14px;
  text-align: center;
  text-decoration: none;
  margin-top: 25px;
  font-size: 16px;
  font-weight: 700;
  border: none;
  cursor: pointer;
  transition: all 0.3s;
  box-shadow: 0 8px 24px var(--primary-glow);
}

.btn:hover {
  transform: translateY(-2px);
  box-shadow: 0 12px 30px var(--primary-glow);
  filter: brightness(1.1);
}

.btn:active {
  transform: translateY(0);
}

/* Toast Notification Style */
.toast-container {
  position: fixed;
  bottom: 30px;
  left: 50%;
  transform: translateX(-50%);
  z-index: 9999;
  display: flex;
  flex-direction: column;
  gap: 10px;
  pointer-events: none;
}

.toast {
  min-width: 280px;
  max-width: 400px;
  background: rgba(15, 23, 42, 0.92);
  backdrop-filter: blur(16px);
  -webkit-backdrop-filter: blur(16px);
  border: 1px solid rgba(255, 255, 255, 0.12);
  padding: 14px 20px;
  border-radius: 16px;
  color: #f1f5f9;
  font-weight: 600;
  font-size: 14px;
  box-shadow: 0 10px 30px rgba(0, 0, 0, 0.35);
  display: flex;
  align-items: center;
  gap: 12px;
  pointer-events: auto;
  opacity: 0;
  transform: translateY(20px);
  transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
}

.toast.show {
  opacity: 1;
  transform: translateY(0);
}

.toast.success {
  border-color: rgba(16, 185, 129, 0.4);
  box-shadow: 0 10px 30px rgba(16, 185, 129, 0.15);
}

.toast.error {
  border-color: rgba(244, 63, 94, 0.4);
  box-shadow: 0 10px 30px rgba(244, 63, 94, 0.15);
}

.toast.warning {
  border-color: rgba(245, 158, 11, 0.4);
  box-shadow: 0 10px 30px rgba(245, 158, 11, 0.15);
}

.toast.info {
  border-color: rgba(14, 165, 233, 0.4);
  box-shadow: 0 10px 30px rgba(14, 165, 233, 0.15);
}

.toast svg {
  flex-shrink: 0;
  width: 20px;
  height: 20px;
}

.toast.success svg { color: #10b981; }
.toast.error svg { color: #f43f5e; }
.toast.warning svg { color: #f59e0b; }
</style>
</head>
<body>
<script>
  (function() {
    const savedTheme = localStorage.getItem("theme") || "light";
    if (savedTheme === "dark") {
      document.body.classList.add("dark-theme");
    }
  })();
</script>

<div class="container">
  <div class="header-area">
    <button id="themeToggleBtn" class="theme-toggle-btn" onclick="window.toggleTheme()">
      <i data-lucide="moon"></i>
    </button>
    <h2>إدخال بيانات اليوم</h2>
    <button class="back-btn" onclick="window.location.href='dashboard.html'">
      <i data-lucide="arrow-left"></i>
    </button>
  </div>

  <div class="form-group">
    <div class="label-wrapper">
      <i data-lucide="user"></i>
      <label for="age">العمر (سنوات)</label>
    </div>
    <input id="age" type="number" placeholder="مثال: 25">
  </div>

  <div class="form-group">
    <div class="label-wrapper">
      <i data-lucide="scale"></i>
      <label for="weight">الوزن (كجم)</label>
    </div>
    <input id="weight" type="number" placeholder="مثال: 70">
  </div>

  <div class="form-group">
    <div class="label-wrapper">
      <i data-lucide="ruler"></i>
      <label for="height">الطول (سم)</label>
    </div>
    <input id="height" type="number" placeholder="مثال: 175">
  </div>

  <div class="form-group">
    <div class="label-wrapper">
      <i data-lucide="bed-double"></i>
      <label for="sleep">ساعات النوم</label>
    </div>
    <input id="sleep" type="number" placeholder="مثال: 8">
  </div>

  <div class="form-group">
    <div class="label-wrapper">
      <i data-lucide="droplet"></i>
      <label for="water">لترات الماء</label>
    </div>
    <input id="water" type="number" step="0.1" placeholder="مثال: 2.5">
  </div>

  <div class="form-group">
    <div class="label-wrapper">
      <i data-lucide="sofa"></i>
      <label for="sitting">ساعات الجلوس الطويل</label>
    </div>
    <input id="sitting" type="number" placeholder="مثال: 4">
  </div>

  <div class="form-group">
    <div class="label-wrapper">
      <i data-lucide="info"></i>
      <label>هل أنت مدخن؟</label>
    </div>
    <div class="radio-group">
      <label class="radio-option" id="smokeYes">
        <input type="radio" name="smoker" value="yes" onchange="updateRadioSelection()"> نعم
      </label>
      <label class="radio-option" id="smokeNo">
        <input type="radio" name="smoker" value="no" onchange="updateRadioSelection()"> لا
      </label>
    </div>
  </div>

  <div class="form-group">
    <div class="label-wrapper">
      <i data-lucide="activity"></i>
      <label>النشاط البدني اليومي</label>
    </div>
    <div class="radio-group">
      <label class="radio-option" id="actLow">
        <input type="radio" name="activity" value="low" onchange="updateActivitySelection()"> 🛋️ خامل
      </label>
      <label class="radio-option" id="actMed">
        <input type="radio" name="activity" value="medium" onchange="updateActivitySelection()"> 🚶 متوسط
      </label>
      <label class="radio-option" id="actHigh">
        <input type="radio" name="activity" value="high" onchange="updateActivitySelection()"> 🏋️ نشط
      </label>
    </div>
  </div>

  <div class="form-group">
    <div class="label-wrapper">
      <i data-lucide="apple"></i>
      <label for="food">جودة الغذاء اليوم (10 = صحي جداً، 1 = سكريات/وجبات سريعة)</label>
      <span id="foodVal" style="margin-right: auto; font-weight: 700; color: var(--primary);">5</span>
    </div>
    <input type="range" id="food" min="1" max="10" value="5" class="slider-input" oninput="document.getElementById('foodVal').innerText = this.value">
  </div>

  <div class="form-group">
    <div class="label-wrapper">
      <i data-lucide="smile"></i>
      <label>الحالة النفسية اليوم</label>
    </div>
    <div class="radio-group">
      <label class="radio-option" id="moodSad">
        <input type="radio" name="mood" value="sad" onchange="updateMoodSelection()"> 😞 سيء
      </label>
      <label class="radio-option" id="moodNeutral">
        <input type="radio" name="mood" value="neutral" onchange="updateMoodSelection()"> 😐 عادي
      </label>
      <label class="radio-option" id="moodHappy">
        <input type="radio" name="mood" value="happy" onchange="updateMoodSelection()"> 😊 ممتاز
      </label>
    </div>
  </div>

  <button type="button" id="saveBtn" class="btn" onclick="saveData()">حفظ البيانات</button>
</div>

<script type="module">
import { db } from "./firebase-config.js";
import { doc, getDoc, setDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

window.showToast = function (message, type = "success") {
  let container = document.getElementById("toastContainer");
  if (!container) {
    container = document.createElement("div");
    container.id = "toastContainer";
    container.className = "toast-container";
    document.body.appendChild(container);
  }

  const toast = document.createElement("div");
  toast.className = `toast ${type}`;
  
  let icon = "info";
  if (type === "success") icon = "check-circle";
  else if (type === "error") icon = "alert-circle";
  else if (type === "warning") icon = "alert-triangle";

  toast.innerHTML = `
    <i data-lucide="${icon}"></i>
    <span>${message}</span>
  `;
  
  container.appendChild(toast);
  
  if (window.lucide) {
    lucide.createIcons();
  }

  setTimeout(() => {
    toast.classList.add("show");
  }, 10);

  setTimeout(() => {
    toast.classList.remove("show");
    setTimeout(() => {
      toast.remove();
      if (container.children.length === 0) {
        container.remove();
      }
    }, 400);
  }, 3500);
};

const uid = localStorage.getItem("uid");
if (!uid) {
  window.showToast("الرجاء تسجيل الدخول أولاً", "warning");
  setTimeout(() => {
    window.location.href = "index.html";
  }, 1500);
}

async function loadTodayData() {
  const today = new Date().toISOString().split("T")[0];
  try {
    const docRef = doc(db, "users", uid, "days", today);
    const snap = await getDoc(docRef);
    if (snap.exists()) {
      const d = snap.data();
      document.getElementById("age").value = d.age || "";
      document.getElementById("weight").value = d.weight || "";
      document.getElementById("height").value = d.height || "";
      document.getElementById("sleep").value = d.sleep || "";
      document.getElementById("water").value = d.water || "";
      document.getElementById("sitting").value = d.sitting || "";
      if (d.smoker) {
        const radio = document.querySelector(`input[name="smoker"][value="${d.smoker}"]`);
        if (radio) {
          radio.checked = true;
          updateRadioSelection();
        }
      }
      if (d.activity) {
        const radio = document.querySelector(`input[name="activity"][value="${d.activity}"]`);
        if (radio) {
          radio.checked = true;
          updateActivitySelection();
        }
      }
      if (d.food !== undefined) {
        document.getElementById("food").value = d.food;
        document.getElementById("foodVal").innerText = d.food;
      }
      if (d.mood) {
        const radio = document.querySelector(`input[name="mood"][value="${d.mood}"]`);
        if (radio) {
          radio.checked = true;
          updateMoodSelection();
        }
      }
    }
  } catch (err) {
    console.error("Error loading daily data:", err);
  }
}

window.saveData = async function () {
  const age = document.getElementById("age").value.trim();
  const weight = document.getElementById("weight").value.trim();
  const height = document.getElementById("height").value.trim();
  const sleep = document.getElementById("sleep").value.trim();
  const water = document.getElementById("water").value.trim();
  const sitting = document.getElementById("sitting").value.trim();
  const smokerEl = document.querySelector("input[name='smoker']:checked");
  const smoker = smokerEl ? smokerEl.value : "";
  const activityEl = document.querySelector("input[name='activity']:checked");
  const activity = activityEl ? activityEl.value : "";
  const food = document.getElementById("food").value;
  const moodEl = document.querySelector("input[name='mood']:checked");
  const mood = moodEl ? moodEl.value : "";

  if (!age || !weight || !height || !sleep || !water || !sitting || !smoker || !activity || !mood) {
    window.showToast("يرجى ملء جميع الحقول واختيار حالة التدخين، النشاط، والمزاج", "warning");
    return;
  }

  const saveBtn = document.getElementById("saveBtn");
  saveBtn.style.opacity = "0.7";
  saveBtn.style.pointerEvents = "none";
  saveBtn.innerText = "جاري الحفظ...";

  const today = new Date().toISOString().split("T")[0];

  try {
    await setDoc(doc(db, "users", uid, "days", today), {
      age: Number(age),
      weight: Number(weight),
      height: Number(height),
      sleep: Number(sleep),
      water: Number(water),
      sitting: Number(sitting),
      smoker: smoker,
      activity: activity,
      food: Number(food),
      mood: mood,
      timestamp: Date.now()
    });
    window.showToast("تم حفظ البيانات بنجاح", "success");
    setTimeout(() => {
      window.location.href = "dashboard.html";
    }, 1500);
  } catch (err) {
    window.showToast("حدث خطأ أثناء الحفظ: " + err.message, "error");
    saveBtn.style.opacity = "1";
    saveBtn.style.pointerEvents = "all";
    saveBtn.innerText = "حفظ البيانات";
  }
};

window.updateRadioSelection = function() {
  const smokeYes = document.getElementById("smokeYes");
  const smokeNo = document.getElementById("smokeNo");
  const yesInput = smokeYes.querySelector("input");
  const noInput = smokeNo.querySelector("input");

  if (yesInput.checked) {
    smokeYes.classList.add("selected");
    smokeNo.classList.remove("selected");
  } else if (noInput.checked) {
    smokeNo.classList.add("selected");
    smokeYes.classList.remove("selected");
  }
};

window.updateActivitySelection = function() {
  const actLow = document.getElementById("actLow");
  const actMed = document.getElementById("actMed");
  const actHigh = document.getElementById("actHigh");

  actLow.classList.remove("selected");
  actMed.classList.remove("selected");
  actHigh.classList.remove("selected");

  if (actLow.querySelector("input").checked) actLow.classList.add("selected");
  if (actMed.querySelector("input").checked) actMed.classList.add("selected");
  if (actHigh.querySelector("input").checked) actHigh.classList.add("selected");
};

window.updateMoodSelection = function() {
  const moodSad = document.getElementById("moodSad");
  const moodNeutral = document.getElementById("moodNeutral");
  const moodHappy = document.getElementById("moodHappy");

  moodSad.classList.remove("selected");
  moodNeutral.classList.remove("selected");
  moodHappy.classList.remove("selected");

  if (moodSad.querySelector("input").checked) moodSad.classList.add("selected");
  if (moodNeutral.querySelector("input").checked) moodNeutral.classList.add("selected");
  if (moodHappy.querySelector("input").checked) moodHappy.classList.add("selected");
};

window.toggleTheme = function() {
  const isDark = document.body.classList.toggle("dark-theme");
  localStorage.setItem("theme", isDark ? "dark" : "light");
  window.updateThemeIcon();
};

window.updateThemeIcon = function() {
  const btn = document.getElementById("themeToggleBtn");
  if (btn) {
    const isDark = document.body.classList.contains("dark-theme");
    btn.innerHTML = `<i data-lucide="${isDark ? 'sun' : 'moon'}"></i>`;
    if (window.lucide) {
      lucide.createIcons();
    }
  }
};

// Initial load
loadTodayData();
window.updateThemeIcon();
</script>

<script>
  lucide.createIcons();
</script>
</body>
</html>
