<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>التقارير الصحية - صحتي الذكية</title>

<!-- Cairo Font -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet">

<!-- Lucide Icons -->
<script src="https://unpkg.com/lucide@latest"></script>

<!-- Chart.js -->
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
:root {
  --primary: #0284c7; /* light medical blue */
  --primary-glow: rgba(2, 132, 199, 0.2);
  --bg: #f0f9ff;
  --card-bg: #ffffff;
  --border: rgba(14, 165, 233, 0.15);
  --box-bg: #f8fafc;
  --box-hover-bg: #f0f9ff;
  --text-primary: #0f172a;
  --text-secondary: #0284c7;
  --text-muted: #64748b;
  --accent-emerald: #10b981;
  --accent-rose: #f43f5e;
  --bg-gradient: linear-gradient(135deg, #e0f2fe 0%, #f0f9ff 100%);
  --orb-1: rgba(14, 165, 233, 0.15);
  --orb-2: rgba(34, 197, 94, 0.1);
  --gauge-track: rgba(148, 163, 184, 0.15);
  --shadow: 0 10px 30px rgba(2, 132, 199, 0.08);
}

body.dark-theme {
  --primary: #4f46e5;
  --primary-glow: rgba(79, 70, 229, 0.4);
  --bg: #0f172a;
  --card-bg: rgba(30, 41, 59, 0.75);
  --border: rgba(255, 255, 255, 0.08);
  --box-bg: rgba(15, 23, 42, 0.4);
  --box-hover-bg: rgba(15, 23, 42, 0.6);
  --text-primary: #f8fafc;
  --text-secondary: #94a3b8;
  --text-muted: #64748b;
  --accent-emerald: #10b981;
  --accent-rose: #f43f5e;
  --bg-gradient: radial-gradient(circle at top right, #1e1b4b 0%, #0f172a 100%);
  --orb-1: rgba(79, 70, 229, 0.35);
  --orb-2: rgba(16, 185, 129, 0.2);
  --gauge-track: rgba(255, 255, 255, 0.05);
  --shadow: 0 20px 40px rgba(0, 0, 0, 0.3);
}

* {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
}

body {
  font-family: "Cairo", sans-serif;
  background: var(--bg-gradient);
  color: var(--text-primary);
  min-height: 100vh;
  padding: 20px 20px 80px 20px;
  display: flex;
  justify-content: center;
  align-items: flex-start;
  position: relative;
}

body::before, body::after {
  content: "";
  position: absolute;
  border-radius: 50%;
  filter: blur(120px);
  z-index: 0;
}
body::before {
  width: 250px;
  height: 250px;
  background: var(--orb-1);
  top: 10%;
  right: 10%;
}
body::after {
  width: 200px;
  height: 200px;
  background: var(--orb-2);
  bottom: 10%;
  left: 10%;
}

.container {
  max-width: 480px;
  width: 100%;
  background: var(--card-bg);
  backdrop-filter: blur(16px);
  -webkit-backdrop-filter: blur(16px);
  border: 1px solid var(--border);
  padding: 25px;
  border-radius: 24px;
  box-shadow: var(--shadow);
  z-index: 10;
  animation: fadeInUp 0.6s cubic-bezier(0.16, 1, 0.3, 1) both;
}

@keyframes fadeInUp {
  from { opacity: 0; transform: translateY(20px); }
  to { opacity: 1; transform: translateY(0); }
}

.header-area {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 25px;
}

h2 {
  font-size: 22px;
  font-weight: 800;
  color: var(--text-primary);
}

.theme-toggle-btn {
  background: rgba(255, 255, 255, 0.05);
  border: 1px solid var(--border);
  color: var(--text-primary);
  width: 40px;
  height: 40px;
  border-radius: 12px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: all 0.3s;
}
.theme-toggle-btn:hover {
  background: rgba(255, 255, 255, 0.15);
  transform: scale(1.05);
}

.report-list {
  display: flex;
  flex-direction: column;
  gap: 14px;
  margin-bottom: 15px;
}

.box {
  background: var(--box-bg);
  border: 1px solid var(--border);
  padding: 18px;
  border-radius: 16px;
  display: flex;
  align-items: center;
  gap: 16px;
  transition: all 0.3s;
}

.box:hover {
  background: var(--box-hover-bg);
  border-color: var(--primary);
}

.box-icon {
  width: 48px;
  height: 48px;
  border-radius: 14px;
  display: flex;
  align-items: center;
  justify-content: center;
}

.box-icon.bmi { background: rgba(99, 102, 241, 0.1); color: #6366f1; }
.box-icon.hydration { background: rgba(56, 189, 248, 0.1); color: #38bdf8; }
.box-icon.sleep { background: rgba(245, 158, 11, 0.1); color: #f59e0b; }

.box-content {
  flex: 1;
}

.box-title {
  font-size: 13px;
  color: var(--text-muted);
  font-weight: 600;
  margin-bottom: 4px;
}

.box-value-group {
  display: flex;
  justify-content: space-between;
  align-items: baseline;
}

.box-value {
  font-size: 20px;
  font-weight: 800;
  color: var(--text-primary);
}

.box-sub {
  font-size: 12px;
  font-weight: bold;
  margin-top: 4px;
}

/* Empty state design */
.empty-state {
  text-align: center;
  padding: 40px 20px;
}

.empty-state i {
  width: 64px;
  height: 64px;
  color: var(--text-secondary);
  margin-bottom: 20px;
  opacity: 0.6;
}

.empty-state p {
  color: var(--text-secondary);
  font-size: 15px;
  margin-bottom: 25px;
  line-height: 1.6;
}

.btn-primary {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  gap: 10px;
  padding: 14px 28px;
  background: linear-gradient(135deg, #4f46e5 0%, #3b82f6 100%);
  color: #fff;
  border-radius: 12px;
  text-decoration: none;
  font-size: 15px;
  font-weight: 700;
  transition: all 0.3s;
  box-shadow: 0 8px 24px rgba(79, 70, 229, 0.3);
  border: none;
  cursor: pointer;
}

.btn-primary:hover {
  transform: translateY(-2px);
  box-shadow: 0 12px 30px rgba(79, 70, 229, 0.5);
}

/* Bottom Navigation */
.bottom-nav {
  position: fixed;
  bottom: 0;
  left: 0;
  right: 0;
  background: var(--card-bg);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  border-top: 1px solid var(--border);
  padding: 10px 20px;
  display: flex;
  justify-content: space-around;
  z-index: 100;
  box-shadow: 0 -4px 20px rgba(0, 0, 0, 0.05);
}

.nav-item {
  display: flex;
  flex-direction: column;
  align-items: center;
  color: var(--text-muted);
  text-decoration: none;
  font-size: 11px;
  font-weight: bold;
  gap: 4px;
  transition: color 0.3s;
  width: 60px;
}

.nav-item i {
  width: 20px;
  height: 20px;
  transition: transform 0.3s;
}

.nav-item:hover {
  color: var(--text-primary);
}

.nav-item.active {
  color: var(--primary);
  text-shadow: 0 0 10px var(--primary-glow);
}

.nav-item.active i {
  transform: translateY(-2px);
}
</style>
</head>
<body>
<script>
  (function() {
    const savedTheme = localStorage.getItem("theme") || "light";
    if (savedTheme === "dark") {
      document.body.classList.add("dark-theme");
    }
  })();
</script>

<div class="container">
  <div class="header-area">
    <button id="themeToggleBtn" class="theme-toggle-btn" onclick="window.toggleTheme()">
      <i data-lucide="moon"></i>
    </button>
    <h2>التقارير الصحية</h2>
    <div style="width: 40px;"></div> <!-- placeholder to center title -->
  </div>

  <!-- Content to be loaded dynamically -->
  <div id="content">
    <div style="text-align: center; padding: 40px 0;">
      <p style="color: var(--text-secondary);">جاري تحميل التقارير...</p>
    </div>
  </div>
</div>

<!-- Bottom Navigation -->
<div class="bottom-nav">
  <a href="dashboard.html" class="nav-item">
    <i data-lucide="layout-dashboard"></i>
    الرئيسية
  </a>
  <a href="analysis.html" class="nav-item">
    <i data-lucide="brain-circuit"></i>
    التحليل
  </a>
  <a href="reports.html" class="nav-item active">
    <i data-lucide="clipboard-list"></i>
    التقارير
  </a>
  <a href="tips.html" class="nav-item">
    <i data-lucide="sparkles"></i>
    النصائح
  </a>
</div>

<script type="module">
import { db } from "./firebase-config.js";
import { doc, getDoc, collection, getDocs } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const uid = localStorage.getItem("uid");
if (!uid) {
  window.location.href = "index.html";
}

window.toggleTheme = function() {
  const isDark = document.body.classList.toggle("dark-theme");
  localStorage.setItem("theme", isDark ? "dark" : "light");
  window.updateThemeIcon();
};

window.updateThemeIcon = function() {
  const btn = document.getElementById("themeToggleBtn");
  if (btn) {
    const isDark = document.body.classList.contains("dark-theme");
    btn.innerHTML = `<i data-lucide="${isDark ? 'sun' : 'moon'}"></i>`;
    if (window.lucide) {
      lucide.createIcons();
    }
  }
};

function calculateScore(d) {
  if (!d) return 0;
  let points = 0;
  
  // 1. Sleep (max 15)
  if (d.sleep >= 7) points += 15;
  else if (d.sleep >= 6) points += 11;
  else if (d.sleep >= 5) points += 7;
  else points += 3;

  // 2. Water (max 15)
  if (d.water >= 3) points += 15;
  else if (d.water >= 2) points += 11;
  else if (d.water >= 1.5) points += 7;
  else points += 3;

  // 3. Sitting (max 10)
  if (d.sitting <= 4) points += 10;
  else if (d.sitting <= 6) points += 7;
  else points += 3;

  // 4. Smoker (max 10)
  if (d.smoker === "no") points += 10;
  else points += 2;

  // 5. Daily Activity (max 15)
  if (d.activity === "high") points += 15;
  else if (d.activity === "medium") points += 11;
  else points += 5;

  // 6. Food Quality (max 20)
  const foodRating = d.food !== undefined ? Number(d.food) : 5;
  points += foodRating * 2;

  // 7. Mental State (max 15)
  if (d.mood === "happy") points += 15;
  else if (d.mood === "neutral") points += 11;
  else points += 5;

  return points;
}

async function loadReport() {
  try {
    // Fetch all records
    const daysRef = collection(db, "users", uid, "days");
    const snap = await getDocs(daysRef);
    
    if (snap.empty) {
      renderEmptyState();
      return;
    }

    const records = [];
    snap.forEach(doc => {
      records.push({ date: doc.id, ...doc.data() });
    });

    // Sort descending by date YYYY-MM-DD
    records.sort((a, b) => b.date.localeCompare(a.date));

    // Get today's record (or latest)
    const d = records[0];

    // BMI, Hydration, Sleep scores
    const bmiVal = d.weight / (d.height/100)**2;
    const bmi = bmiVal.toFixed(1);
    const hydration = Math.round((d.water / 3) * 100);
    const sleepScore = Math.round((d.sleep / 8) * 100);

    // BMI Evaluation
    let bmiClass = "";
    let bmiColor = "";
    if (bmiVal < 18.5) {
      bmiClass = "نقص في الوزن (نحافة)";
      bmiColor = "#38bdf8";
    } else if (bmiVal >= 18.5 && bmiVal <= 24.9) {
      bmiClass = "وزن مثالي (صحي)";
      bmiColor = "#10b981";
    } else if (bmiVal >= 25 && bmiVal <= 29.9) {
      bmiClass = "زيادة في الوزن";
      bmiColor = "#f59e0b";
    } else {
      bmiClass = "سمنة مفرطة";
      bmiColor = "#f43f5e";
    }

    renderReportContent(bmi, bmiClass, bmiColor, hydration, d.water, sleepScore, d.sleep);

    // Calculate comparative metrics
    // 1. Daily improvement (Today vs Yesterday)
    const todayScore = calculateScore(records[0]);
    const yesterdayScore = records.length > 1 ? calculateScore(records[1]) : null;
    
    const improvementTextEl = document.getElementById("improvementComparisonText");
    const improvementIconEl = document.getElementById("improvementIcon");
    if (yesterdayScore === null) {
      improvementTextEl.innerText = "سجل بياناتك غداً للبدء في تتبع تحسنك اليومي!";
      improvementTextEl.style.color = "var(--text-secondary)";
    } else {
      const diff = todayScore - yesterdayScore;
      if (diff > 0) {
        improvementTextEl.innerText = `تحسن بمقدار +${diff} نقاط مقارنة بيوم أمس 📈`;
        improvementTextEl.style.color = "var(--accent-emerald)";
        improvementIconEl.style.color = "var(--accent-emerald)";
        improvementIconEl.style.background = "rgba(16, 185, 129, 0.1)";
        improvementIconEl.innerHTML = `<i data-lucide="trending-up"></i>`;
      } else if (diff < 0) {
        improvementTextEl.innerText = `تراجع بمقدار ${diff} نقاط مقارنة بيوم أمس 📉`;
        improvementTextEl.style.color = "var(--accent-rose)";
        improvementIconEl.style.color = "var(--accent-rose)";
        improvementIconEl.style.background = "rgba(244, 63, 94, 0.1)";
        improvementIconEl.innerHTML = `<i data-lucide="trending-down"></i>`;
      } else {
        improvementTextEl.innerText = `ثبات في المستوى مقارنة بيوم أمس ⚖️`;
        improvementTextEl.style.color = "var(--text-secondary)";
        improvementIconEl.style.color = "var(--text-secondary)";
        improvementIconEl.style.background = "rgba(148, 163, 184, 0.1)";
        improvementIconEl.innerHTML = `<i data-lucide="minus"></i>`;
      }
    }

    // 2. Weekly comparison (Last 7 days vs Previous 7 days)
    const last7 = records.slice(0, 7);
    const prev7 = records.slice(7, 14);
    const thisWeekAvg = last7.reduce((acc, r) => acc + calculateScore(r), 0) / last7.length;
    const weeklyCompEl = document.getElementById("weeklyComparisonText");
    
    if (prev7.length === 0) {
      weeklyCompEl.innerText = `معدل نقاطك لهذا الأسبوع هو ${thisWeekAvg.toFixed(1)} نقطة من 100.`;
    } else {
      const prevWeekAvg = prev7.reduce((acc, r) => acc + calculateScore(r), 0) / prev7.length;
      const diff = thisWeekAvg - prevWeekAvg;
      weeklyCompEl.innerText = `معدل الأسبوع الحالي ${thisWeekAvg.toFixed(1)} مقارنة بـ ${prevWeekAvg.toFixed(1)} الأسبوع الماضي (${diff >= 0 ? '+' : ''}${diff.toFixed(1)} نقاط)`;
    }

    // 3. Monthly comparison (Last 30 days)
    const monthlyCompEl = document.getElementById("monthlyComparisonText");
    const thisMonthAvg = records.reduce((acc, r) => acc + calculateScore(r), 0) / records.length;
    monthlyCompEl.innerText = `معدل نقاطك لآخر 30 يوماً هو ${thisMonthAvg.toFixed(1)} نقطة من 100.`;

    // Render chart
    renderChart(records.slice(0, 7).reverse());

  } catch (err) {
    console.error("Error loading report:", err);
    document.getElementById("content").innerHTML = `
      <div class="empty-state">
        <i data-lucide="alert-triangle" style="color: #f43f5e;"></i>
        <p style="color: #f43f5e; font-weight: bold; margin-bottom: 10px;">فشل الاتصال بقاعدة البيانات</p>
        <p style="font-size: 13px; max-width: 320px; margin: 0 auto 20px auto;">يرجى التأكد من تفعيل قواعد البيانات Firestore Database في لوحة تحكم Firebase وتحديث الصفحة.</p>
        <a href="https://console.firebase.google.com" target="_blank" class="btn-primary" style="padding: 10px 20px; font-size: 13px;">
          انتقال إلى لوحة Firebase
        </a>
      </div>
    `;
    lucide.createIcons();
  }
}

function renderChart(records) {
  const labels = records.map(r => r.date.slice(5)); // MM-DD
  const values = records.map(r => calculateScore(r));

  const ctx = document.getElementById("healthProgressChart").getContext("2d");
  const isDark = document.body.classList.contains("dark-theme");
  const gridColor = isDark ? "rgba(255, 255, 255, 0.08)" : "rgba(14, 165, 233, 0.12)";
  const labelColor = isDark ? "#94a3b8" : "#475569";

  new Chart(ctx, {
    type: "line",
    data: {
      labels,
      datasets: [{
        label: "نقاط الصحة العامة",
        data: values,
        borderColor: "var(--primary)",
        backgroundColor: "var(--primary-glow)",
        borderWidth: 3,
        fill: true,
        tension: 0.4,
        pointBackgroundColor: "var(--primary)",
        pointBorderColor: "#fff",
        pointHoverRadius: 6
      }]
    },
    options: {
      responsive: true,
      plugins: {
        legend: {
          display: false
        }
      },
      scales: {
        x: {
          grid: { color: gridColor },
          ticks: { color: labelColor, font: { family: "Cairo", size: 10 } }
        },
        y: {
          grid: { color: gridColor },
          ticks: { color: labelColor, font: { family: "Cairo", size: 10 } },
          suggestedMax: 100,
          suggestedMin: 0
        }
      }
    }
  });
}

function renderEmptyState() {
  const container = document.getElementById("content");
  container.innerHTML = `
    <div class="empty-state">
      <i data-lucide="clipboard-x"></i>
      <p>لم يتم إدخال بيانات اليوم حتى الآن. يرجى تزويدنا ببياناتك اليومية لنتمكن من عرض التقارير التفصيلية لحالتك الصحية.</p>
      <a href="input.html" class="btn-primary">
        <i data-lucide="plus-circle" style="width: 20px; height: 20px; margin-left: 8px; vertical-align: middle;"></i>
        إدخال بيانات اليوم
      </a>
    </div>
  `;
  lucide.createIcons();
}

function renderReportContent(bmi, bmiClass, bmiColor, hydration, waterVal, sleepScore, sleepVal) {
  const container = document.getElementById("content");
  container.innerHTML = `
    <div class="report-list">
      <div class="box">
        <div class="box-icon bmi">
          <i data-lucide="calculator"></i>
        </div>
        <div class="box-content">
          <div class="box-title">مؤشر كتلة الجسم (BMI)</div>
          <div class="box-value-group">
            <span class="box-value">${bmi}</span>
            <span class="box-sub" style="color: ${bmiColor};">${bmiClass}</span>
          </div>
        </div>
      </div>

      <div class="box">
        <div class="box-icon hydration">
          <i data-lucide="droplet"></i>
        </div>
        <div class="box-content">
          <div class="box-title">ترطيب الجسم</div>
          <div class="box-value-group">
            <span class="box-value">${hydration}%</span>
            <span class="box-sub" style="color: #38bdf8;">${waterVal} لتر من 3 لتر</span>
          </div>
        </div>
      </div>

      <div class="box">
        <div class="box-icon sleep">
          <i data-lucide="bed-double"></i>
        </div>
        <div class="box-content">
          <div class="box-title">جودة النوم</div>
          <div class="box-value-group">
            <span class="box-value">${sleepScore}%</span>
            <span class="box-sub" style="color: #f59e0b;">${sleepVal} ساعات من 8 ساعات</span>
          </div>
        </div>
      </div>
    </div>

    <!-- Health Score Progress Line Chart -->
    <div class="chart-card" style="margin-top: 20px;">
      <div class="chart-title">
        <i data-lucide="line-chart"></i>
        <span>تطور نقاط الصحة العامة (آخر 7 أيام)</span>
      </div>
      <canvas id="healthProgressChart" height="180"></canvas>
    </div>

    <!-- Comparative Comparison Cards -->
    <div class="report-section-title" style="margin: 25px 0 10px 0; font-weight: 700; font-size: 15px; display: flex; align-items: center; gap: 8px;">
      <i data-lucide="git-compare" style="color: var(--primary);"></i>
      <span>مقارنات وتحسن الصحة</span>
    </div>
    <div class="comparison-grid" style="display: flex; flex-direction: column; gap: 12px; margin-bottom: 20px;">
      <div class="box">
        <div class="box-icon" style="background: rgba(14, 165, 233, 0.1); color: #0ea5e9;">
          <i data-lucide="calendar"></i>
        </div>
        <div class="box-content">
          <div class="box-title">المقارنة الأسبوعية</div>
          <span class="box-sub" style="font-size: 13px; color: var(--text-primary); font-weight: 600;" id="weeklyComparisonText">جاري الحساب...</span>
        </div>
      </div>
      
      <div class="box">
        <div class="box-icon" style="background: rgba(168, 85, 247, 0.1); color: #a855f7;">
          <i data-lucide="calendar-range"></i>
        </div>
        <div class="box-content">
          <div class="box-title">المقارنة الشهرية</div>
          <span class="box-sub" style="font-size: 13px; color: var(--text-primary); font-weight: 600;" id="monthlyComparisonText">جاري الحساب...</span>
        </div>
      </div>

      <div class="box">
        <div id="improvementIcon" class="box-icon" style="background: rgba(16, 185, 129, 0.1); color: #10b981;">
          <i data-lucide="trending-up"></i>
        </div>
        <div class="box-content">
          <div class="box-title">متابعة التحسن اليومي</div>
          <span class="box-sub" style="font-size: 13px; font-weight: 700;" id="improvementComparisonText">جاري الحساب...</span>
        </div>
      </div>
    </div>
  `;
  lucide.createIcons();
}

loadReport();
window.updateThemeIcon();
</script>

<script>
  lucide.createIcons();
</script>
</body>
</html>
