<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>تسجيل الدخول - صحتي الذكية</title>

<!-- Cairo Font -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet">

<!-- Lucide Icons -->
<script src="https://unpkg.com/lucide@latest"></script>

<style>
:root {
  --primary: #4f46e5;
  --primary-glow: rgba(79, 70, 229, 0.4);
  --bg: #0f172a;
  --card-bg: rgba(30, 41, 59, 0.7);
  --border: rgba(255, 255, 255, 0.08);
  --text-primary: #f8fafc;
  --text-secondary: #94a3b8;
}

* {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
}

body {
  font-family: "Cairo", sans-serif;
  background: radial-gradient(circle at top right, #1e1b4b 0%, var(--bg) 100%);
  color: var(--text-primary);
  min-height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  padding: 20px;
  overflow: hidden;
  position: relative;
}

/* Background Glowing Orbs */
body::before, body::after {
  content: "";
  position: absolute;
  border-radius: 50%;
  filter: blur(120px);
  z-index: 0;
}
body::before {
  width: 300px;
  height: 300px;
  background: rgba(79, 70, 229, 0.35);
  top: 15%;
  right: 15%;
}
body::after {
  width: 250px;
  height: 250px;
  background: rgba(16, 185, 129, 0.2);
  bottom: 15%;
  left: 15%;
}

.container {
  max-width: 420px;
  width: 100%;
  background: var(--card-bg);
  backdrop-filter: blur(16px);
  -webkit-backdrop-filter: blur(16px);
  border: 1px solid var(--border);
  padding: 40px 30px;
  border-radius: 24px;
  box-shadow: 0 20px 40px rgba(0, 0, 0, 0.3);
  text-align: center;
  z-index: 10;
  animation: fadeInUp 0.8s cubic-bezier(0.16, 1, 0.3, 1) both;
}

@keyframes fadeInUp {
  from {
    opacity: 0;
    transform: translateY(20px);
  }
  to {
    opacity: 1;
    transform: translateY(0);
  }
}

.logo-area {
  margin-bottom: 30px;
  display: inline-flex;
  justify-content: center;
  align-items: center;
  width: 80px;
  height: 80px;
  border-radius: 20px;
  background: linear-gradient(135deg, #4f46e5 0%, #06b6d4 100%);
  box-shadow: 0 8px 24px var(--primary-glow);
  position: relative;
}
.logo-area i {
  color: #fff;
  width: 38px;
  height: 38px;
  animation: pulse 2s infinite;
}

@keyframes pulse {
  0%, 100% {
    transform: scale(1);
    filter: drop-shadow(0 0 2px rgba(255,255,255,0.5));
  }
  50% {
    transform: scale(1.1);
    filter: drop-shadow(0 0 10px rgba(255,255,255,0.8));
  }
}

h2 {
  font-size: 26px;
  font-weight: 800;
  color: #fff;
  margin-bottom: 8px;
  letter-spacing: -0.5px;
}

p.subtitle {
  color: var(--text-secondary);
  font-size: 15px;
  margin-bottom: 35px;
  line-height: 1.6;
}

.btn {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 12px;
  width: 100%;
  padding: 16px;
  background: rgba(255, 255, 255, 0.08);
  border: 1px solid rgba(255, 255, 255, 0.15);
  color: #fff;
  border-radius: 14px;
  font-size: 16px;
  font-weight: 700;
  cursor: pointer;
  transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
  text-decoration: none;
}

.btn:hover {
  background: #fff;
  color: #0f172a;
  transform: translateY(-2px);
  box-shadow: 0 10px 20px rgba(0, 0, 0, 0.2);
}

.btn:active {
  transform: translateY(0);
}

.btn svg {
  width: 20px;
  height: 20px;
}

.footer-text {
  margin-top: 30px;
  font-size: 12px;
  color: var(--text-secondary);
}

/* Toast Notification Style */
.toast-container {
  position: fixed;
  bottom: 30px;
  left: 50%;
  transform: translateX(-50%);
  z-index: 9999;
  display: flex;
  flex-direction: column;
  gap: 10px;
  pointer-events: none;
}

.toast {
  min-width: 280px;
  max-width: 400px;
  background: rgba(30, 41, 59, 0.85);
  backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);
  border: 1px solid rgba(255, 255, 255, 0.08);
  padding: 14px 20px;
  border-radius: 16px;
  color: #fff;
  font-weight: 600;
  font-size: 14px;
  box-shadow: 0 10px 30px rgba(0, 0, 0, 0.4);
  display: flex;
  align-items: center;
  gap: 12px;
  pointer-events: auto;
  opacity: 0;
  transform: translateY(20px);
  transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
}

.toast.show {
  opacity: 1;
  transform: translateY(0);
}

.toast.success {
  border-color: rgba(16, 185, 129, 0.4);
  box-shadow: 0 10px 30px rgba(16, 185, 129, 0.15);
}

.toast.error {
  border-color: rgba(244, 63, 94, 0.4);
  box-shadow: 0 10px 30px rgba(244, 63, 94, 0.15);
}

.toast.warning {
  border-color: rgba(245, 158, 11, 0.4);
  box-shadow: 0 10px 30px rgba(245, 158, 11, 0.15);
}

.toast svg {
  flex-shrink: 0;
  width: 20px;
  height: 20px;
}

.toast.success svg { color: #10b981; }
.toast.error svg { color: #f43f5e; }
.toast.warning svg { color: #f59e0b; }
</style>

<script type="module">
import { auth, provider } from "./firebase-config.js";
import { signInWithPopup } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

window.showToast = function (message, type = "success") {
  let container = document.getElementById("toastContainer");
  if (!container) {
    container = document.createElement("div");
    container.id = "toastContainer";
    container.className = "toast-container";
    document.body.appendChild(container);
  }

  const toast = document.createElement("div");
  toast.className = `toast ${type}`;
  
  let icon = "info";
  if (type === "success") icon = "check-circle";
  else if (type === "error") icon = "alert-circle";
  else if (type === "warning") icon = "alert-triangle";

  toast.innerHTML = `
    <i data-lucide="${icon}"></i>
    <span>${message}</span>
  `;
  
  container.appendChild(toast);
  
  if (window.lucide) {
    lucide.createIcons();
  }

  setTimeout(() => {
    toast.classList.add("show");
  }, 10);

  setTimeout(() => {
    toast.classList.remove("show");
    setTimeout(() => {
      toast.remove();
      if (container.children.length === 0) {
        container.remove();
      }
    }, 400);
  }, 3500);
};

window.loginGoogle = function () {
  const btn = document.getElementById("loginBtn");
  btn.style.opacity = "0.7";
  btn.style.pointerEvents = "none";
  btn.innerHTML = 'جاري تسجيل الدخول...';

  signInWithPopup(auth, provider)
    .then(result => {
      localStorage.setItem("uid", result.user.uid);
      window.location.href = "home.html";
    })
    .catch(err => {
      window.showToast("حدث خطأ أثناء تسجيل الدخول: " + err.message, "error");
      btn.style.opacity = "1";
      btn.style.pointerEvents = "all";
      btn.innerHTML = `
        <svg viewBox="0 0 24 24" width="20" height="20" style="margin-left: 10px;">
          <path fill="currentColor" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
          <path fill="currentColor" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
          <path fill="currentColor" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.06H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.94l2.85-2.22.81-.63z"/>
          <path fill="currentColor" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.06l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
        </svg>
        تسجيل الدخول عبر Google
      `;
    });
};
</script>
</head>
<body>

<div class="container">
  <div class="logo-area">
    <i data-lucide="activity"></i>
  </div>
  <h2>صحتي الذكية</h2>
  <p class="subtitle">حلول ذكية تعتني بصحتك، تتبع سلوكك اليومي، واحصل على تقارير تفصيلية فورية.</p>
  
  <button id="loginBtn" class="btn" onclick="loginGoogle()">
    <svg viewBox="0 0 24 24" style="margin-left: 10px;">
      <path fill="currentColor" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
      <path fill="currentColor" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
      <path fill="currentColor" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.06H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.94l2.85-2.22.81-.63z"/>
      <path fill="currentColor" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.06l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
    </svg>
    تسجيل الدخول عبر Google
  </button>

  <p class="footer-text">جميع الحقوق محفوظة © صحتي الذكية 2026</p>
</div>

<script>
  lucide.createIcons();
</script>
</body>
</html>
